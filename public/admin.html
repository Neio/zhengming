<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | ZhengMing</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .admin-header {
      margin-bottom: 40px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      padding: 10px 20px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #000;
      transform: translateX(-5px);
    }

    .admin-section {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
      margin-bottom: 30px;
    }

    .admin-section h2 {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.05rem;
    }

    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #c41e3a;
      background: #fff5f5;
    }

    .upload-zone p {
      margin: 0;
      color: #666;
      font-size: 1rem;
      line-height: 1.6;
    }

    .upload-zone .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
    }

    .status-msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      min-height: 1.5em;
      background: #f0f0f0;
      color: #555;
    }

    .status-msg:empty {
      background: none;
      padding: 0;
    }

    .status-success {
      background: #e6f9f0;
      color: #1a7a4a;
      border-left: 4px solid #1a7a4a;
    }

    .status-error {
      background: #fef2f2;
      color: #c41e3a;
      border-left: 4px solid #c41e3a;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }

    .mini-stat {
      flex: 1;
      background: #f8f8f8;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .mini-stat .val {
      font-size: 1.8rem;
      font-weight: 800;
      color: #c41e3a;
    }

    .mini-stat .label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 style="font-size: 2.5rem; margin:0;">Admin</h1>
        <p style="color:#888; margin-top:5px;">Upload and manage debate evidence</p>
      </div>
      <a href="/" class="back-btn">← Back to Search</a>
    </div>

    <div class="admin-section">
      <h2>Upload Evidence</h2>
      <div class="upload-zone" id="upload-zone">
        <span class="upload-icon">📂</span>
        <p>Drag &amp; drop a Verbatim-formatted <strong>.docx</strong>, <strong>.zip</strong>, or <strong>.csv</strong> file here</p>
        <p style="margin-top:8px; font-size:0.9rem; color:#aaa;">or click to browse files</p>
        <input type="file" id="file-input" accept=".docx,.zip,.csv" style="display: none;">
      </div>
      <div id="upload-status" class="status-msg"></div>
    </div>

    <div class="admin-section">
      <h2>Database Stats</h2>
      <div class="stats-row">
        <div class="mini-stat">
          <div class="val" id="stat-count">-</div>
          <div class="label">Total Cards</div>
        </div>
        <div class="mini-stat">
          <div class="val" id="stat-size">-</div>
          <div class="label">Index Size</div>
        </div>
        <div class="mini-stat">
          <div class="val" id="stat-pending">0</div>
          <div class="label">Pending Ingestion</div>
        </div>
      </div>
      <a href="/stats.html" style="display:block; margin-top:20px; color:#c41e3a; font-weight:800; text-decoration:none;">View Detailed Insights →</a>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
