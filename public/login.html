<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ZhengMing</title>
  <link rel="stylesheet" href="/style.css?v=1.1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #fcfcfc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: white;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
      text-align: center;
    }

    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #333;
      margin-bottom: 8px;
    }

    .brand-logo .chinese {
      font-family: inherit;
      color: #c41e3a;
      font-style: italic;
    }

    .login-subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 8px;
    }

    .login-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: #c41e3a;
      box-shadow: 0 0 0 4px rgba(196, 30, 58, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: #c41e3a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #a01830;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.2);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      color: #c41e3a;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 16px;
      min-height: 1.2em;
    }

    .back-home {
      display: block;
      margin-top: 32px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-home:hover {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="brand-logo">ZhengMing <span class="chinese">争鸣</span></div>
      <p class="login-subtitle">Admin authentication required</p>
      
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <input type="password" id="password" class="login-input" placeholder="••••••••" autocomplete="current-password" autofocus>
      </div>

      <button id="login-btn" class="login-btn">Sign In</button>
      <div id="login-error" class="login-error"></div>

      <a href="/" class="back-home">← Back to Search</a>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');

    async function handleLogin() {
      const password = passwordInput.value;
      if (!password) {
        loginError.textContent = 'Please enter your password';
        return;
      }

      loginError.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Authenticating...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          // Success! Redirect to admin
          window.location.href = '/admin';
        } else {
          loginError.textContent = res.status === 401 ? 'Invalid password' : 'Authentication failed';
        }
      } catch (e) {
        loginError.textContent = 'Network error: ' + e.message;
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
  <footer>
    <p>&copy; 2026 Neio Zhou. All rights reserved.</p>
  </footer>
</body>
</html>
