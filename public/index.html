<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZhengMing (争鸣): A Debate Search Engine</title>
  <link rel="stylesheet" href="/style.css?v=1.1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Home View -->
  <div id="home-view" class="container">
    <div class="hero-banner">
      <h1 class="hero-logo-text">ZhengMing <span class="chinese">争鸣</span></h1>
      <p class="hero-tagline">Debate Evidence Search</p>
    </div>

    <div class="row">
      <input type="text" id="search-input" class="search" placeholder="Search..." autocomplete="off">
      <button type="button" id="search-btn" class="submit">Submit</button>
    </div>
  </div>

  <!-- Search Results View -->
  <div id="search-view" class="results-container hidden">
    <header class="header">
      <div class="logo-small-container">
        <h1 class="logo-small" id="logo-small">ZhengMing (争鸣)</h1>
      </div>
      <div class="header-search-row">
        <input type="text" id="header-search-input" class="search-small" placeholder="Search..." autocomplete="off">
        <button type="button" id="header-search-btn" class="submit-small">Search</button>
        <div class="header-search-options">
          <label class="checkbox-container small">
            <input type="checkbox" id="header-search-body-check">
            <span class="checkmark"></span>
            Search Body
          </label>
        </div>
      </div>
    </header>

    <div class="results-layout">

      <main class="results-main">
        <div id="results-count" class="results-count"></div>
        <div id="cards-container" class="cards-container">
          <!-- Cards injected by JS -->
        </div>
      </main>
    </div>
  </div>

  <script src="/app.js?v=1.1.0"></script>
  <footer>
    <p>&copy; 2026 Neio Zhou. All rights reserved.</p>
  </footer>
</body>

</html>
