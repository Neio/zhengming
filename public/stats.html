<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Insights | ZhengMing</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    .stats-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats-header {
      margin-bottom: 40px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .stats-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #f0f0f0;
    }

    .stats-card h2 {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05rem;
    }

    .big-num {
      font-size: 3rem;
      font-weight: 800;
      color: #c41e3a;
      margin: 10px 0;
    }

    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .bar-label {
      width: 100px;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-container {
      flex: 1;
      height: 12px;
      background: #f0f0f0;
      border-radius: 6px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c41e3a, #e63946);
      border-radius: 6px;
      transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .bar-val {
      width: 50px;
      font-weight: 800;
      color: #333;
      text-align: right;
    }

    .back-btn {
      padding: 10px 20px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #000;
      transform: translateX(-5px);
    }
  </style>
</head>
<body>
  <div class="stats-container">
    <div class="stats-header">
      <div>
        <h1 style="font-size: 2.5rem; margin:0;">Database Insights</h1>
        <p style="color:#888; margin-top:5px;">In-depth statistics for the ZhengMing database</p>
      </div>
      <a href="/" class="back-btn">← Back to Search</a>
    </div>

    <div class="stats-grid">
      <div class="stats-card">
        <h2>System Status</h2>
        <div class="big-num" id="total-docs">-</div>
        <p style="font-weight:600; color:#333;">Total Indexed Cards</p>
        
        <div style="margin-top:25px; padding-top:20px; border-top: 1px solid #eee;">
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="color:#666;">Pending Ingestion:</span>
            <span id="pending-docs" style="font-weight:800; color:#e63946;">0</span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="color:#666;">Index Storage:</span>
            <span id="storage-size" style="font-weight:800; color:#333;">-</span>
          </div>
        </div>
      </div>

      <div class="stats-card">
        <h2>Breakdown by Round</h2>
        <div id="rounds-chart" class="bar-chart"></div>
      </div>

      <div class="stats-card">
        <h2>Top Tournaments</h2>
        <div id="tournaments-chart" class="bar-chart"></div>
      </div>

      <div class="stats-card">
        <h2>Leading Schools</h2>
        <div id="schools-chart" class="bar-chart"></div>
      </div>

      <div class="stats-card">
        <h2>Temporal Distribution (Year)</h2>
        <div id="years-chart" class="bar-chart"></div>
      </div>

      <div class="stats-card">
        <h2>Event Distribution</h2>
        <div id="events-chart" class="bar-chart"></div>
      </div>
    </div>
  </div>

  <script src="/stats.js"></script>
</body>
</html>
